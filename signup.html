<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MA Services™ - Create your account">
    <title>MA Services™ | Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ================================================
   PURISTA FONTS
================================================ */
@font-face {
    font-family: 'Purista';
    src: url('assets/webfonts/purista_thin-webfont.woff2') format('woff2'),
         url('assets/webfonts/purista_thin-webfont.woff') format('woff'),
         url('assets/webfonts/Purista Thin.ttf') format('truetype');
    font-weight: 100;
    font-style: normal;
    font-display: swap;
}

@font-face {
    font-family: 'Purista';
    src: url('assets/webfonts/purista_light-webfont.woff2') format('woff2'),
         url('assets/webfonts/purista_light-webfont.woff') format('woff'),
         url('assets/webfonts/Purista Light.ttf') format('truetype');
    font-weight: 300;
    font-style: normal;
    font-display: swap;
}

@font-face {
    font-family: 'Purista';
    src: url('assets/webfonts/Purista.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
}

@font-face {
    font-family: 'Purista';
    src: url('assets/webfonts/Purista SemiBold.ttf') format('truetype');
    font-weight: 600;
    font-style: normal;
    font-display: swap;
}

@font-face {
    font-family: 'Purista';
    src: url('assets/webfonts/purista_bold-webfont.woff2') format('woff2'),
         url('assets/webfonts/purista_bold-webfont.woff') format('woff'),
         url('assets/webfonts/Purista Bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
}

/* ================================================
   MULTILINGUAL & RTL ENGINE
================================================ */
@font-face {
    font-family: 'Janna LT';
    src: url('assets/webfonts/Janna_LT_Regular.ttf') format('truetype');
    font-weight: 400; font-style: normal; font-display: swap;
}

.lang-switcher {
    display: flex; gap: 10px; margin-left: 20px; align-items: center;
}
.lang-orb {
    width: 28px; height: 28px; border-radius: 50%; overflow: hidden;
    cursor: pointer; border: 2px solid rgba(255,255,255,0.2);
    transition: all var(--ease) 0.3s; filter: grayscale(100%);
}
.lang-orb:hover, .lang-orb.active {
    filter: grayscale(0%); border-color: var(--orange); transform: scale(1.1);
}
.lang-orb img { width: 100%; height: 100%; object-fit: cover; }

html[dir="rtl"] {
    --fn-display: 'Janna LT', sans-serif;
    --fn-sub: 'Janna LT', sans-serif;
    --fn-body: 'Janna LT', sans-serif;
}

html[dir="rtl"] body { direction: rtl; text-align: right; }
html[dir="rtl"] .nav-list { flex-direction: row-reverse; }
html[dir="rtl"] .btn-primary::before { left: 100%; }
html[dir="rtl"] .btn-primary:hover::before { left: -100%; }
html[dir="rtl"] .auth-card { text-align: right; }
html[dir="rtl"] .input-group i { left: auto; right: 16px; }
html[dir="rtl"] .input-group input { padding-left: 16px; padding-right: 48px; }

/* ================================================
   ROOT & VARIABLES
================================================ */
:root {
    --orange:          #FF6B2B;
    --orange-dark:     #CC4B0F;
    --orange-glow:     rgba(255, 107, 43, 0.22);
    --orange-glow-s:   rgba(255, 107, 43, 0.50);
    --charcoal:        #2A2A2A;
    --steel:           #3A3A3A;
    --dark:            #0E0E0E;
    --darker:          #080808;
    --card:            #161616;
    --card-light:      #1D1D1D;
    --border:          rgba(255,107,43,0.14);
    --border-b:        rgba(255,107,43,0.38);
    --white:           #FFFFFF;
    --off-white:       #F4F4F4;
    --muted:           #7A7A7A;
    --light:           #C8C8C8;
    --fn-display:      'Purista', sans-serif;
    --fn-sub:          'Purista', sans-serif;
    --fn-body:         'Purista', sans-serif;
    --ease:            cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
    background: var(--dark);
    color: var(--white);
    font-family: var(--fn-body);
    overflow-x: hidden;
    cursor: none;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--darker); }
::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 2px; }

/* ================================================
   CUSTOM CURSOR
================================================ */
#cur-dot {
    width: 9px; height: 9px;
    background: var(--orange);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
}
#cur-ring {
    width: 30px; height: 30px;
    border: 1.5px solid var(--orange);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    opacity: 0.55;
    transition: width .15s, height .15s, opacity .15s;
}
.cursor-big #cur-ring { width: 46px; height: 46px; opacity: 0.9; }

/* ================================================
   HEADER
================================================ */
#hdr {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    transition: background .35s var(--ease), border .35s;
}
#hdr.scrolled {
    background: rgba(8,8,8,.93);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
}
.navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 17px 0;
}
.logo-link {
    display: flex;
    align-items: center;
    gap: 13px;
    text-decoration: none;
}
.logo-img {
    height: 50px;
    width: 50px;
    object-fit: contain;
    filter: drop-shadow(0 0 12px var(--orange-glow-s));
    transition: filter .3s;
}
.logo-link:hover .logo-img { filter: drop-shadow(0 0 22px var(--orange)); }
.logo-texts { display: flex; flex-direction: column; }
.logo-name {
    font-family: var(--fn-display);
    font-weight: 700;
    font-size: 1.65rem;
    letter-spacing: 3px;
    color: var(--white);
    line-height: 1;
}
.logo-name em { color: var(--orange); font-style: normal; }
.logo-sub {
    font-family: var(--fn-sub);
    font-size: .62rem;
    letter-spacing: 2.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
}
.nav-list {
    display: flex;
    list-style: none;
    gap: 32px;
    align-items: center;
}
.nav-list a {
    font-family: var(--fn-sub);
    font-size: .93rem;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--light);
    text-decoration: none;
    transition: color .25s;
    position: relative;
}
.nav-list a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 2px;
    background: var(--orange);
    transition: width .3s var(--ease);
}
.nav-list a:hover { color: var(--orange); }
.nav-list a:hover::after { width: 100%; }
.nav-list a.active { color: var(--orange); }
.nav-list a.active::after { width: 100%; }
.nav-cta {
    background: var(--orange) !important;
    color: #000 !important;
    padding: 9px 22px;
    border-radius: 3px;
    font-weight: 700 !important;
    box-shadow: 0 0 16px var(--orange-glow) !important;
}
.nav-cta:hover { background: #fff !important; }
.nav-cta::after { display: none !important; }
.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 5px; }
.hamburger span { display: block; width: 24px; height: 2px; background: var(--white); transition: all .3s var(--ease); }
.hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

.container { max-width: 1260px; margin: 0 auto; padding: 0 32px; }

/* ================================================
   AUTH SECTION (LOGIN/SIGNUP)
================================================ */
.auth-section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 140px 32px 80px;
    position: relative;
    overflow: hidden;
}
#auth-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.15;
}
.auth-vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(255,107,43,.06) 0%, transparent 65%);
    pointer-events: none;
}
.auth-card {
    position: relative;
    z-index: 2;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px 42px;
    max-width: 480px;
    width: 100%;
    backdrop-filter: blur(4px);
    transition: all .3s var(--ease);
}
.auth-card:hover {
    border-color: var(--border-b);
    box-shadow: 0 20px 50px rgba(0,0,0,.4), 0 0 0 1px var(--border-b);
}
.auth-header {
    text-align: center;
    margin-bottom: 36px;
}
.auth-icon {
    width: 70px;
    height: 70px;
    margin: 0 auto 20px;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: var(--orange-glow);
    border: 1px solid var(--border-b);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: var(--orange);
}
.auth-title {
    font-family: var(--fn-display);
    font-size: 2.5rem;
    letter-spacing: 2px;
    color: var(--white);
}
.auth-title .orange { color: var(--orange); }
.auth-sub {
    font-family: var(--fn-sub);
    font-size: .88rem;
    color: var(--muted);
    margin-top: 8px;
}
.input-group {
    margin-bottom: 24px;
    position: relative;
}
.input-group i {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    transition: color .3s;
}
.input-group input {
    width: 100%;
    background: var(--darker);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 14px 16px 14px 48px;
    font-family: var(--fn-body);
    font-size: .95rem;
    border-radius: 8px;
    outline: none;
    transition: all .3s var(--ease);
}
.input-group input:focus {
    border-color: var(--orange);
    box-shadow: 0 0 12px var(--orange-glow);
}
.input-group input:focus + i {
    color: var(--orange);
}
.input-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
}
.remember {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--fn-sub);
    font-size: .85rem;
    color: var(--muted);
    cursor: pointer;
}
.remember input {
    width: 16px;
    height: 16px;
    accent-color: var(--orange);
    cursor: pointer;
}
.forgot-link {
    font-family: var(--fn-sub);
    font-size: .85rem;
    color: var(--orange);
    text-decoration: none;
    transition: color .3s;
}
.forgot-link:hover {
    color: var(--white);
    text-decoration: underline;
}
.btn-auth {
    width: 100%;
    background: var(--orange);
    color: #000;
    padding: 14px;
    font-family: var(--fn-sub);
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all .3s var(--ease);
    position: relative;
    overflow: hidden;
    margin-bottom: 20px;
}
.btn-auth::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
    transition: left .5s;
}
.btn-auth:hover::before { left: 100%; }
.btn-auth:hover {
    background: #fff;
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(255,107,43,.4);
}
.auth-footer {
    text-align: center;
    font-family: var(--fn-sub);
    font-size: .9rem;
    color: var(--muted);
    margin-top: 20px;
}
.auth-footer a {
    color: var(--orange);
    text-decoration: none;
    font-weight: 600;
    transition: color .3s;
}
.auth-footer a:hover {
    color: var(--white);
    text-decoration: underline;
}
.divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 24px 0;
    color: var(--muted);
    font-size: .8rem;
}
.divider::before,
.divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
}
.social-login {
    display: flex;
    gap: 16px;
    justify-content: center;
}
.social-btn {
    width: 46px;
    height: 46px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    text-decoration: none;
    font-size: 1.2rem;
    transition: all .3s var(--ease);
}
.social-btn:hover {
    background: var(--orange);
    color: #000;
    border-color: var(--orange);
    transform: translateY(-3px);
}

/* ================================================
   FOOTER
================================================ */
footer {
    background: var(--darker);
    border-top: 1px solid var(--border);
    padding: 40px 0 28px;
    margin-top: auto;
}
.foot-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 14px;
}
.copy {
    font-family: var(--fn-sub);
    font-size: .78rem;
    letter-spacing: 1px;
    color: var(--muted);
}
.foot-stamp {
    font-family: var(--fn-sub);
    font-size: .75rem;
    letter-spacing: 2px;
    color: var(--muted);
}
.foot-stamp em { color: var(--orange); font-style: normal; }

/* ================================================
   MOBILE MENU
================================================ */
#mob-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.78);
    z-index: 198;
    opacity: 0;
    pointer-events: none;
    transition: opacity .38s;
}
#mob-overlay.on { opacity: 1; pointer-events: all; }
#mob-menu {
    position: fixed;
    top: 0;
    right: -100%;
    width: 82vw;
    max-width: 340px;
    height: 100vh;
    background: var(--card);
    border-left: 1px solid var(--border-b);
    z-index: 199;
    padding: 28px;
    transition: right .38s var(--ease);
    overflow-y: auto;
}
#mob-menu.on { right: 0; }
.mob-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 36px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
}
.mob-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.45rem;
    cursor: pointer;
    transition: color .2s;
}
.mob-close:hover { color: var(--orange); }
.mob-links {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-bottom: 28px;
}
.mob-links a {
    display: block;
    font-family: var(--fn-display);
    font-size: 2.1rem;
    letter-spacing: 2px;
    color: var(--light);
    text-decoration: none;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    transition: all .25s;
}
.mob-links a:hover { color: var(--orange); padding-left: 10px; }
.mob-socials {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 28px;
}
.soc-btn {
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    text-decoration: none;
    font-size: .88rem;
    transition: all .3s var(--ease);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
}
.soc-btn:hover { background: var(--orange); color: #000; border-color: var(--orange); }

/* ================================================
   RESPONSIVE
================================================ */
@media (max-width: 768px) {
    .nav-list { display: none; }
    .hamburger { display: flex; }
    .container { padding: 0 20px; }
    .auth-card { padding: 36px 24px; }
    .auth-title { font-size: 2rem; }
    .auth-section { padding: 120px 20px 60px; }
    .foot-bottom { flex-direction: column; text-align: center; }
}
@media (max-width: 480px) {
    .logo-name { font-size: 1.3rem; }
    .auth-card { padding: 28px 20px; }
}
</style>
</head>
<body>

<div id="cur-dot"></div>
<div id="cur-ring"></div>

<header id="hdr">
    <div class="container">
        <nav class="navbar">
            <a href="index.html" class="logo-link">
                <img src="media/images/Logo_1.png" alt="MA Services" class="logo-img">
                <div class="logo-texts">
                    <span class="logo-name"><em>MA</em> SERVICES<sup style="font-size:.45em;color:var(--muted);vertical-align:super;">™</sup></span>
                    <span class="logo-sub" data-i18n="logo_sub">Academic E-Solutions</span>
                </div>
            </a>

            <ul class="nav-list">
                <li><a href="index.html#services" data-i18n="nav_services">Services</a></li>
                <li><a href="index.html#process" data-i18n="nav_process">Process</a></li>
                <li><a href="index.html#why" data-i18n="nav_why">Why Us</a></li>
                <li><a href="index.html#contact" data-i18n="nav_contact">Contact</a></li>
                <li><a href="signup.html" class="nav-cta" data-i18n="nav_signup">Sign Up <i class="fas fa-user-plus"></i></a></li>
            </ul>

            <div class="lang-switcher">
                <div class="lang-orb" onclick="switchLang('en')" id="lang-en" title="English">
                    <img src="media/images/GB.png" alt="EN">
                </div>
                <div class="lang-orb" onclick="switchLang('ar')" id="lang-ar" title="Arabic">
                    <img src="media/images/Ar.png" alt="AR">
                </div>
            </div>

            <div class="hamburger" id="hbg" onclick="toggleMob()">
                <span></span><span></span><span></span>
            </div>
        </nav>
    </div>
</header>

<section class="auth-section">
    <canvas id="auth-canvas"></canvas>
    <div class="auth-vignette"></div>

    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1 class="auth-title" data-i18n="signup_title">CREATE <span class="orange">ACCOUNT</span></h1>
            <p class="auth-sub" data-i18n="signup_sub">Join MA Services today</p>
        </div>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="fullName" placeholder="Full Name" data-i18n-placeholder="fullname_ph" required>
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="signupEmail" placeholder="Email Address" data-i18n-placeholder="email_ph" required>
            </div>
            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="tel" id="phone" placeholder="WhatsApp / Phone" data-i18n-placeholder="phone_ph">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="signupPassword" placeholder="Password" data-i18n-placeholder="password_ph" required>
            </div>
            <div class="input-group">
                <i class="fas fa-check-circle"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" data-i18n-placeholder="confirm_ph" required>
            </div>

            <label class="remember" style="margin-bottom: 24px; justify-content: center;">
                <input type="checkbox" required> <span data-i18n="agree_terms">I agree to the Terms & Conditions</span>
            </label>

            <button type="submit" class="btn-auth" data-i18n="signup_btn">SIGN UP</button>
        </form>

        <div class="divider" data-i18n="or">OR</div>

        <div class="social-login">
            <a href="#" class="social-btn"><i class="fab fa-google"></i></a>
            <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="social-btn"><i class="fab fa-apple"></i></a>
        </div>

        <div class="auth-footer">
            <span data-i18n="have_account">Already have an account?</span> <a href="login.html" data-i18n="login_link">Login</a>
        </div>
    </div>
</section>

<script type="module">
  import { auth, db } from './assets/js/firebase-config.js';
  import { createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const signupForm = document.getElementById('signupForm');
  const fullNameInput = document.getElementById('fullName');
  const emailInput = document.getElementById('signupEmail');
  const phoneInput = document.getElementById('phone');
  const passwordInput = document.getElementById('signupPassword');
  const confirmInput = document.getElementById('confirmPassword');
  const termsCheckbox = document.querySelector('input[type="checkbox"]');
  const submitBtn = signupForm?.querySelector('.btn-auth');

  window.handleSignup = async function(e) {
    e.preventDefault();
    const name = fullNameInput.value.trim();
    const email = emailInput.value.trim();
    const phone = phoneInput.value.trim();
    const password = passwordInput.value;
    const confirm = confirmInput.value;

    if (!name || !email || !password) {
      alert('Please fill in all required fields.');
      return;
    }
    if (password !== confirm) {
      alert('Passwords do not match.');
      return;
    }
    if (password.length < 6) {
      alert('Password must be at least 6 characters.');
      return;
    }
    if (!termsCheckbox?.checked) {
      alert('You must agree to the Terms & Conditions.');
      return;
    }

    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Creating account...';
    }

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;
      await updateProfile(user, { displayName: name });
      await setDoc(doc(db, 'users', user.uid), {
        uid: user.uid,
        name: name,
        email: email,
        phone: phone || '',
        role: 'student',
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });
      alert('Account created successfully! Please login.');
      window.location.href = 'login.html';
    } catch (error) {
      console.error(error);
      let errorMsg = 'Registration failed. ';
      if (error.code === 'auth/email-already-in-use') errorMsg += 'Email already registered.';
      else if (error.code === 'auth/invalid-email') errorMsg += 'Invalid email address.';
      else if (error.code === 'auth/weak-password') errorMsg += 'Password too weak.';
      else errorMsg += error.message;
      alert(errorMsg);
    } finally {
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'SIGN UP';
      }
    }
  };

  signupForm?.addEventListener('submit', (e) => {
    e.preventDefault();
    window.handleSignup(e);
  });
</script>

<script>
// Custom Cursor
const dot = document.getElementById('cur-dot'), ring = document.getElementById('cur-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    dot.style.cssText = `left:${mx}px;top:${my}px;`;
});
(function anim() {
    rx += (mx - rx) * .12;
    ry += (my - ry) * .12;
    ring.style.cssText = `left:${rx}px;top:${ry}px;`;
    requestAnimationFrame(anim);
})();
document.querySelectorAll('a, button, .social-btn').forEach(el => {

});
if ('ontouchstart' in window) { dot.style.display = 'none'; ring.style.display = 'none'; document.body.style.cursor = 'auto'; }

// Canvas Animation
(function() {
    const c = document.getElementById('auth-canvas');
    if (!c) return;
    const ctx = c.getContext('2d');
    const S = 45, W = S * 2, H = Math.sqrt(3) * S;
    let hexes = [];
    function resize() { c.width = window.innerWidth; c.height = window.innerHeight; init(); }
    function init() {
        hexes = [];
        const cols = Math.ceil(c.width / (W * .75)) + 3;
        const rows = Math.ceil(c.height / H) + 3;
        for (let col = -1; col < cols; col++) {
            for (let row = -1; row < rows; row++) {
                hexes.push({
                    cx: col * W * .75,
                    cy: row * H + (col % 2 ? H / 2 : 0),
                    p: Math.random() * Math.PI * 2,
                    sp: .003 + Math.random() * .009,
                    br: .12 + Math.random() * .88
                });
            }
        }
    }
    function hexPath(cx, cy, r) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const a = Math.PI / 180 * (60 * i - 30);
            i ? ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a)) : ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
        }
        ctx.closePath();
    }
    function draw() {
        ctx.clearRect(0, 0, c.width, c.height);
        for (const h of hexes) {
            h.p += h.sp;
            const a = (Math.sin(h.p) * .5 + .5) * h.br;
            hexPath(h.cx, h.cy, S - 2);
            ctx.strokeStyle = `rgba(255,107,43,${a * .45})`;
            ctx.lineWidth = 0.7;
            ctx.stroke();
            if (a > .78) {
                hexPath(h.cx, h.cy, S - 2);
                ctx.fillStyle = `rgba(255,107,43,${(a - .78) * .12})`;
                ctx.fill();
            }
        }
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', resize);
    resize();
    draw();
})();

function switchLang(lang) {
    localStorage.setItem('sys-lang', lang);
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.querySelectorAll('.lang-orb').forEach(orb => orb.classList.remove('active'));
    document.getElementById(`lang-${lang}`).classList.add('active');
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[lang][key]) {
            if(el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = dict[lang][key];
            else el.innerHTML = dict[lang][key];
        }
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (dict[lang][key]) el.placeholder = dict[lang][key];
    });
}

    const savedLang = localStorage.getItem('sys-lang') || 'en';
